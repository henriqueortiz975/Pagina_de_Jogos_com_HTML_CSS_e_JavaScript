<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação de Número</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>🎯 Jogo de Adivinhação de Número</h1>

        <div class = "BotoesTela">

            <button class = "Modo">Modo: SinglePlayer</button>
            <button class = "Dificuldade">Dificuldade: Média</button>
            <button class = "Reiniciar">Reiniciar</button>
            <button class = "Voltar">Voltar</button>

        </div>

    </header>
    
    <main class = "container">

        <div class = "Subtitulo">
            <p class = "Tag">Digite um número entre 1 e 100:</p>
        </div>

        <section class = "JogoDeAdivinhacao">

            <div class = "Caixa">

                <div class = "Adivinhacao">

                    <input class = "CaixaPalpite" type="number" id="EnviarPalpite"
                     min="1" max="100" placeholder="Digite seu palpite aqui">
                    <button class = "EnviarPalpite" id="palpite">Enviar Palpite</button>
                    <p class = "Situacao" id="Situacao"></p>

                </div>
            
                <div class = "Adivinhacao"> 

                    <p class = "TituloTentativas">TENTATIVAS</p>
                    <p class = "QuantidadeTentativas" id="QuantidadeTentativas">0</p>
            
                </div>
                
            </div>
            
 

        </section>
    </main>

    <footer>
        © 2026 Jogo de Adivinhação de Número. Desenvolvido para Programação Website I.
    </footer>

    <script src = "js/script.js"></script>

</body>
</html>
