<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Jogo Pedra, Papel e Tesoura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>

        <div class = "BotoesTela">

            <button class = "Voltar">Voltar</button>

        </div>

    </header>
    
    <main class = "container">

        <div class = "Subtitulo">
            <p class = "Tag">Escolha sua jogada:</p>
        </div>

        <section class = "JogoDePedraPapelTesoura">
            
            <div class = "PedraPapelTesoura">

                <div class = "BotoesJogada">
                    <button class = "Pedra" id="Pedra">Pedra</button>
                    <button class = "Papel" id="Papel">Papel</button>
                    <button class = "Tesoura" id="Tesoura">Tesoura</button>
                </div>

                <div class = "Situacao" id="Situacao"></div>
                <div class = "Resultado" id="resultado"></div>

            </div> 

        </section>
    </main>

    <footer>
        © 2026 Jogo Pedra, Papel e Tesoura. Desenvolvido para Programação Website I.
    </footer>

    <script src = "script.js"></script>

</html>
