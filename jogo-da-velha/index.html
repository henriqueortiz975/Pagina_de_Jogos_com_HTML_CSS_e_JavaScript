<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da velha</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Cabeçalho -->
    <header>

        <!-- Titulo -->
        <h1>#️⃣ Jogo da velha</h1>

        <!-- Criação de uma div para colocar os botões -->
        <div class = "BotoesTela">

            <!-- Botões -->
            <button class = "modo">modo: Multiplayer</button>
            <button class = "Rank">Ranking</button>
            <button class = "Reiniciar">Reiniciar</button>
            <button class = "Voltar">Voltar</button>

        </div>

    </header>
    
    <!-- Meio da pagina -->
    <main class = "container">

        <!-- Organizar o subtitulo no meio-->
        <div class = "Subtitulo">

            <!-- Subtitulo -->
            <p class = "Tag">Vez do 1º Jogador</p>

        </div>

         <!-- Section da criação do jogo, usado para organizar o css -->
        <section class = "JogoDaVelha">
            
            <!-- Uma box que vai ficar toda a informação do jogo da velha -->
            <div class = "fundoVelha">

                <!-- Primeira coluna de 3 -->
                <div id = "1" class = "bloco"></div>
                <div id = "2" class = "bloco"></div>
                <div id = "3" class = "bloco"></div>

                <!-- Segunda coluna de 3 -->
                <div id = "4" class = "bloco"></div>
                <div id = "5" class = "bloco"></div>
                <div id = "6" class = "bloco"></div>

                <!-- Terceira coluna de 3 -->
                <div id = "7" class = "bloco"></div>
                <div id = "8" class = "bloco"></div>
                <div id = "9" class = "bloco"></div>
                    
            </div>
        </section>
    </main>

    <!--Rodapé-->
    <footer>© 2026 Jogo da velha. Desenvolvido para Programação Website I.</footer>

    <script src = "js/script.js"></script>

</body>
</html>
